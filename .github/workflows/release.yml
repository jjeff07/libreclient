name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump override (leave empty to auto-detect)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (build only, no publish/push)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Bump, Changelog, Build & Tag
    runs-on: ubuntu-latest
    # Skip release commits pushed by the bot to prevent loops
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message || '', 'release:')
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.decide.outputs.skip }}
      dry_run: ${{ steps.set-dry-run.outputs.dry_run }}

    steps:
      - name: Resolve dry_run flag
        id: set-dry-run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: "true"

      - name: Install dependencies
        run: uv sync

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # --- Determine Bump Type ---
      - name: Determine version bump
        id: decide
        uses: actions/github-script@v9
        with:
          script: |
            // Manual override takes priority
            const manualBump = '${{ inputs.bump }}';
            if (manualBump) {
              core.setOutput('bump', manualBump);
              core.setOutput('skip', 'false');
              core.info(`Manual override: ${manualBump}`);
              return;
            }

            // Check PR labels for override
            let labels = [];
            if (context.eventName === 'push') {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
              if (prs.length > 0) {
                labels = prs[0].labels.map(l => l.name);
              }
            }

            // Label override
            if (labels.includes('bump:major')) {
              core.setOutput('bump', 'major');
              core.setOutput('skip', 'false');
              core.info('Label override: major');
              return;
            }
            if (labels.includes('bump:minor')) {
              core.setOutput('bump', 'minor');
              core.setOutput('skip', 'false');
              core.info('Label override: minor');
              return;
            }
            if (labels.includes('bump:patch')) {
              core.setOutput('bump', 'patch');
              core.setOutput('skip', 'false');
              core.info('Label override: patch');
              return;
            }
            if (labels.includes('no-release')) {
              core.setOutput('skip', 'true');
              core.info('Skipping release: no-release label');
              return;
            }

            // Auto-detect from conventional commits since last tag
            const { execSync } = require('child_process');
            let commits;
            try {
              const prevTag = execSync('git describe --tags --abbrev=0 2>/dev/null', { encoding: 'utf8' }).trim();
              commits = execSync(`git log ${prevTag}..HEAD --pretty=format:"%s%n%b" --no-merges`, { encoding: 'utf8' });
            } catch {
              commits = execSync('git log --pretty=format:"%s%n%b" --no-merges', { encoding: 'utf8' });
            }

            const lines = commits.split('\n').filter(Boolean);

            if (lines.length === 0) {
              core.setOutput('skip', 'true');
              core.info('No commits since last tag');
              return;
            }

            let bump = 'skip';
            for (const msg of lines) {
              if (msg.includes('BREAKING CHANGE') || /^[a-z]+(\(.+\))?!:/.test(msg)) {
                bump = 'major';
                break;
              }
              if (/^feat(\(.+\))?:/.test(msg)) {
                bump = 'minor';
              }
              if (bump === 'skip' && /^(fix|perf)(\(.+\))?:/.test(msg)) {
                bump = 'patch';
              }
            }

            if (bump === 'skip') {
              core.setOutput('skip', 'true');
              core.info('No releasable commits (chore/docs/ci only)');
              return;
            }

            core.setOutput('bump', bump);
            core.setOutput('skip', 'false');
            core.info(`Auto-detected bump: ${bump}`);

      # --- Stop here if no release needed ---
      - name: Skip if no release
        if: steps.decide.outputs.skip == 'true'
        run: echo "No releasable changes — skipping release."

      # --- Version Bump ---
      - name: Get current version
        if: steps.decide.outputs.skip != 'true'
        id: current
        run: echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Bump version
        if: steps.decide.outputs.skip != 'true'
        id: bump
        run: |
          uv version --bump ${{ steps.decide.outputs.bump }}
          echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"
          echo "Bumped version: ${{ steps.current.outputs.version }} → $(uv version --short)"

      # --- Changelog ---
      - name: Generate changelog entry
        if: steps.decide.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Get commit messages since last tag (or all if no tags)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- release:")
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- release:")
          fi

          python3 - "$NEW_VERSION" "$DATE" "$PREV_TAG" "$COMMITS" <<'EOF'
          import sys
          from pathlib import Path

          version, date, prev_tag, commits = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          repo = "https://github.com/jjeff07/libreclient"

          entry = f"\n## [{version}] - {date}\n\n### Changed\n\n{commits}\n"

          changelog = Path("CHANGELOG.md")
          content = changelog.read_text()

          # Insert new entry after ## [Unreleased] line
          marker = "## [Unreleased]"
          idx = content.find(marker)
          if idx != -1:
              end_of_line = content.index("\n", idx)
              content = content[:end_of_line + 1] + entry + content[end_of_line + 1:]

          # Update [Unreleased] comparison link
          unreleased_link = f"[Unreleased]: {repo}/compare/v{version}...HEAD"
          import re
          content = re.sub(r"\[Unreleased\]:.*", unreleased_link, content)

          # Add version comparison link
          if prev_tag:
              version_link = f"[{version}]: {repo}/compare/{prev_tag}...v{version}"
          else:
              version_link = f"[{version}]: {repo}/releases/tag/v{version}"

          # Insert version link after [Unreleased] link
          content = content.replace(unreleased_link, f"{unreleased_link}\n{version_link}")

          changelog.write_text(content)
          EOF

      # --- Generate Type Stubs ---
      - name: Generate .pyi stubs
        if: steps.decide.outputs.skip != 'true'
        run: uv run python scripts/generate_stubs.py

      # --- Build ---
      - name: Build package
        if: steps.decide.outputs.skip != 'true'
        run: uv build

      # --- Upload dist for publish jobs ---
      - name: Upload dist artifacts
        if: steps.decide.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Show changelog diff
        if: steps.decide.outputs.skip != 'true'
        run: git diff CHANGELOG.md

      # --- Commit & Tag ---
      - name: Commit version bump and changelog
        if: steps.decide.outputs.skip != 'true' && steps.set-dry-run.outputs.dry_run != 'true'
        id: commit
        run: |
          git add pyproject.toml uv.lock CHANGELOG.md
          git commit -m "release: v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

          # Extract the changelog entry for this version
          VERSION="${{ steps.bump.outputs.version }}"
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/p; /^## \[${VERSION}\]/!{ /^## \[/!p; } }" CHANGELOG.md)
          # Write to file to avoid escaping issues
          echo "$BODY" > /tmp/release-body.md

      # --- GitHub Release ---
      - name: Create GitHub Release
        if: steps.decide.outputs.skip != 'true' && steps.set-dry-run.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body_path: /tmp/release-body.md
          files: dist/*

      # --- Sync dev branch ---
      - name: Reset dev to main
        if: steps.set-dry-run.outputs.dry_run != 'true'
        continue-on-error: true
        run: |
          git push origin HEAD:refs/heads/dev --force

  publish-testpypi:
    name: Publish to TestPyPI
    needs: release
    if: needs.release.outputs.skipped != 'true' && needs.release.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: testpypi
      url: https://test.pypi.org/project/libreclient/

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.skipped != 'true' && needs.release.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/libreclient/

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Publish to PyPI
        run: uv publish
